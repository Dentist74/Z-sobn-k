name: Zaloha databaze
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Stahnout zalohu
        run: curl -fsSL "https://zasobnik.up.railway.app/api/export/db?token=${{ secrets.BACKUP_TOKEN }}" -o zasobnik-backup.db
      - uses: actions/upload-artifact@v4
        with:
          name: zasobnik-db
          path: zasobnik-backup.db
          retention-days: 90
